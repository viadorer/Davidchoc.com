<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Přesměrování — Blog | David Choc</title>
    <link rel="canonical" href="https://www.davidchoc.cz/blog">
    <script>
      // Old SPA URLs blog/detail.html?id=slug → new static URLs blog/posts/slug.html
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        if (id && /^[a-z0-9-]+$/i.test(id)) {
          window.location.replace('/blog/posts/' + id + '.html');
        } else {
          window.location.replace('/blog');
        }
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/blog">
</head>
<body>
    <p>Přesměrovávám na <a href="/blog">blog</a>…</p>
</body>
</html>
